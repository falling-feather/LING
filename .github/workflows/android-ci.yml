name: android-ci

on:
  push:
    branches: [android]
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [android, main]
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

jobs:
  build:
    name: build + unit-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper
        # 仓库不入库 wrapper.jar；用 setup-gradle 提供的 gradle 8.7 生成
        run: gradle wrapper --gradle-version 8.7

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests (JVM)
        run: ./gradlew :app:testDebugUnitTest --stacktrace --no-configuration-cache

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-configuration-cache

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ling-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            android/app/build/reports/tests/
            android/app/build/test-results/
          retention-days: 7
